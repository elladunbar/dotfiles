# ==========================================
# Tmux Configuration for Claude Code + Neovim
# ==========================================

# --------------------------
# Core Settings
# --------------------------
# Extended keys
set -g extended-keys on
set -g extended-keys-format csi-u

# Prefix key: Ctrl-Space
set-option -g prefix C-space
unbind C-b

# Faster escape time response
set-option -g escape-time 0

# ==========================================================
# True Color Support (Ghostty)
# ==========================================================
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*:RGB"
set -ga terminal-overrides ",*:Tc"

# Mouse support for pane/window switching
set-option -g mouse on

# History for debugging output
set-option -g history-limit 100000

# Default shell: Fish
set-option -g default-shell "/run/current-system/sw/bin/fish"

# Allow passthrough for OSC52 clipboard sequences
set -g allow-passthrough on

# Use 1-based indexing
set -g base-index 1
setw -g pane-base-index 1

# Auto renumber windows on close
set -g renumber-windows on

# --------------------------
# Keybindings
# --------------------------

bind r source-file ~/.config/tmux/tmux.conf \; display "Config reloaded!"

# Pane navigation (vim-style via vim-tmux-navigator)
# Already handled by vim-tmux-navigator plugin

# Pane management
bind v split-window -h -c pane-active-target
bind s split-window -v -c pane-active-target
# Layout cycling via tmux builtin (requires prefix then space then direction)
# Alternatively, install tmux-plugin-mux for full toggle-layout functionality
bind x kill-pane
bind o select-pane -t +L

# Window management
bind c new-window -c pane-active-target
bind & kill-window
bind n next-window
bind p previous-window
bind 0 select-window -t 0
bind 1 select-window -t 1
bind 2 select-window -t 2
bind 3 select-window -t 3
bind 4 select-window -t 4
bind 5 select-window -t 5
bind 6 select-window -t 6
bind 7 select-window -t 7
bind 8 select-window -t 8
bind 9 select-window -t 9
bind , rename-window -
bind w select-window

# --------------------------
# Status Bar
# --------------------------
# Left side: session name and window list
set-option -g status-left "#[bg=default,fg=black]#[bg=black,fg=white] #S #[bg=default,fg=black]#[default] "
# set-option -g status-left "#[bg=black,fg=white]#[bg=white,fg=black] #S #[bg=black,fg=white] #[default]"
# set-option -g status-left-length 40

# Right side: current command, hostname, time
set-option -g status-right "#[bg=default,fg=black]#[bg=black,fg=white] %H:%M #[bg=black,fg=blue]#[bg=blue,fg=white] #h #[bg=default,fg=blue]"
# set-option -g status-right "#[bg=black,fg=white]#[bg=white,fg=black] %H:%M #[bg=white,fg=brightblue]#[bg=brightblue,fg=black] #h #[bg=black,fg=brightblue]"
# set-option -g status-right-length 50

# Status bar appearance
# set-option -g status-bg white
# set-option -g status-fg black
# set-option -g status-bg black
# set-option -g status-fg white

set-option -g status-style bg=default

# Mode timer display (1 second)
set-option -g display-time 1000

# --------------------------
# TPM (Tmux Plugin Manager)
# --------------------------
set -g @plugin "tmux-plugins/tpm"
set -g @plugin "christoomey/vim-tmux-navigator"

# Initialize TPM (keep this line at the very bottom of tmux.conf)
run "~/.config/tmux/plugins/tpm/tpm"
