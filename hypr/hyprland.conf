monitorv2 {
    output = DP-1
    mode = 3440x1440@120
    position = 0x0
    scale = 1
}
# monitor = HDMI-A-1, 3840x2160@120, 3440x0, 2, bitdepth, 10, cm, wide
monitor = HDMI-A-1, 1920x1080@120, 3440x0, 1#, bitdepth, 10, cm, wide
# monitor = HDMI-A-1, 3840x2160@120, 3440x0, 2, bitdepth, 10, mirror, DP-1, cm, wide
monitorv2 {
    output = HEADLESS-2
    mode = 1920x1080@60
    position = 0x0
    scale = 1
}

# get pywal variables (colors and wallpaper)
source = ~/.cache/wal/colors-hyprland.conf

# automatic starting
exec-once = hyprpm reload
exec-once = uwsm app -- awww-daemon
exec-once = uwsm app -- pywalfox start
exec-once = uwsm app -- xsettingsd

exec-once=[workspace 1 silent] uwsm app -- firefox
exec-once=[workspace 1 silent] uwsm app -- element-desktop --password-store=gnome-libsecret
exec-once=[workspace 1 silent] uwsm app -- openrgb
exec-once=[workspace 2 silent] uwsm app -- ghostty
exec-once=[workspace 2 silent] uwsm app -- ghostty
exec-once=[workspace 10 silent] uwsm app -- com.spotify.Client


# real settings
general {
    gaps_in = 8
    gaps_out = 16
    border_size = 4
    col.active_border = $color10
    col.inactive_border = $color8

    layout = scrolling
}

decoration {
    rounding = 12
    # rounding_power = 4.0

    blur {
        enabled = true
        size = 4
        passes = 3
        ignore_opacity = true
        new_optimizations = true
        noise = 0.06
        contrast = 1.0
        brightness = 1.0
        vibrancy = 0.0
    }

    shadow {
        range = 120
        render_power = 4
        color = 0x88040404
        offset = 0 10
    }
}

animations {
    enabled = true

    bezier = myBezier, 0.05, 0.9, 0.1, 1.05

    animation = windows, 1, 7, myBezier
    animation = windowsOut, 1, 7, default, popin 80%
    animation = border, 1, 10, default
    animation = borderangle, 1, 8, default
    animation = fade, 1, 7, default
    animation = workspaces, 1, 6, default
}

input {
    kb_layout = us
    kb_options = caps:swapescape
    numlock_by_default = true

    follow_mouse = 1

    touchpad {
        natural_scroll = true
    }

    sensitivity = 0 # -1.0 - 1.0, 0 means no modification.
}

group {
    insert_after_current = false
    col.border_active = $color10
    col.border_inactive = $color8

    groupbar {
        enabled = true
        font_family = SF Pro Display
        font_size = 18
        gradients = true
        height = 24
        indicator_height = 0
        render_titles = false
        gradient_rounding = 12
        # gradient_rounding_power = 4.0
        gradient_round_only_edges = false
        gaps_in = 4
        gaps_out = 4
        text_color = $color0
        col.active = $color10
        col.inactive = $color8
    }
}

misc {
    disable_hyprland_logo = true
    disable_splash_rendering = true
    vfr = true
    vrr = 2
    disable_autoreload = true
}

binds {
    focus_preferred_method = 1
}

xwayland {
    force_zero_scaling = true
}

render {
    direct_scanout = false
}

cursor {
    sync_gsettings_theme = true
}

ecosystem {
    no_update_news = true
    no_donation_nag = true
}

dwindle {
    pseudotile = true # master switch for pseudotiling
    preserve_split = true # you probably want this
}

plugin {
    hyprbars {
        bar_color = $colorbg
        bar_height = 32
        col.text = $colorfg
        bar_title_enabled = true
        bar_text_size = 18
        bar_text_font = SF Pro Display
        bar_text_align = center
        bar_buttons_alignment = left
        bar_part_of_window = true
        bar_precedence_over_border = true

        hyprbars-button = $color6, 20, 󰅖, hyprctl dispatch killactive
        hyprbars-button = $color14, 20, 󰖯, hyprctl dispatch fullscreen 1
    }
}


# layer rules
layerrule = match:namespace waybar, blur on
layerrule = match:namespace waybar, ignore_alpha 0
layerrule = match:namespace vicinae, blur on
layerrule = match:namespace vicinae, ignore_alpha 0


# window rules
windowrule = match:class ^(.*\.exe)$, float on
windowrule = match:class ^(steam_app_.*)$, float on
windowrule = match:class ^(steam_proton)$, float on
windowrule = match:class (steam), match:title negative:^(Steam)$, float on
windowrule = match:class ^(org\.gnome\.Calculator)$, float on
windowrule = match:class (imv), float on
windowrule = match:class (org.matplotlib.Matplotlib3), float on
windowrule = match:class (Matplotlib), float on
windowrule = match:class (firefox), match:title (Picture-in-Picture), float on

windowrule = match:class ^(com.mitchellh.ghostty)$, opacity 1.0 override 0.85 override

windowrule = match:class ^(com.discordapp.Discord)$, opacity 0.8 override 0.7 override
windowrule = match:class ^(Element)$, opacity 0.8 override 0.7 override
windowrule = match:class ^(rstudio)$, opacity 0.8 override 0.7 override

# windowrule = opacity 0.0 override, class:^(xwaylandvideobridge)$
# windowrule = noanim, class:^(xwaylandvideobridge)$
# windowrule = noinitialfocus, class:^(xwaylandvideobridge)$
# windowrule = maxsize 1 1, class:^(xwaylandvideobridge)$
# windowrule = noblur, class:^(xwaylandvideobridge)$

windowrule = match:float off, hyprbars:no_bar on


# set keybinds
$mainMod = SUPER
$terminal = uwsm app -- ghostty
$fileManager = uwsm app -- io.elementary.files

# applications
bind = $mainMod, Return, exec, $terminal
bind = $mainMod, space, exec, vicinae toggle
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, T, exec, daynight
bind = $mainMod, S, exec, grim - | wl-copy
bind = $mainMod SHIFT, S, exec, grim -g "$(slurp)" - | swappy -f - -o - | wl-copy
bind = $mainMod, V, exec, $HOME/Code/sh/mpv/play.sh "$(wl-paste)"
bind = $mainMod SHIFT, N, exec, systemctl suspend
bind = , code:108, exec, handy --toggle-transcription

# keyboard
binde =, XF86MonBrightnessDown, exec, brightnessctl set 5%- -n 1
binde =, XF86MonBrightnessUp, exec, brightnessctl set +5% -n 1
binde =, XF86AudioRaiseVolume, exec, wpctl set-volume -l 1.0 @DEFAULT_AUDIO_SINK@ 2.5%+ && makoctl dismiss && notify-send "Volume: $(wpctl get-volume @DEFAULT_AUDIO_SINK@ | cut -c 11-)%"
binde =, XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 2.5%- && makoctl dismiss && notify-send "Volume: $(wpctl get-volume @DEFAULT_AUDIO_SINK@ | cut -c 11-)%"
binde =, XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
binde =$mainMod, XF86AudioRaiseVolume, exec, streamraise
binde =$mainMod, XF86AudioLowerVolume, exec, streamlower
binde =$mainMod, XF86AudioMute, exec, streammute
bind =, XF86AudioPlay, exec, playerctl play-pause
bind =, XF86AudioStop, exec, playerctl stop
bind =, XF86AudioPrev, exec, playerctl previous
bind =, XF86AudioNext, exec, playerctl next

# hyprland
bind = $mainMod, R, exec, hyprctl reload && notify-send "Reloaded Hyprland config!"
bind = $mainMod SHIFT, R, exec, killall -SIGUSR2 waybar && notify-send "Reloaded Waybar config!"
bind = $mainMod, Q, killactive
bind = $mainMod, M, exec, uwsm stop
bind = $mainMod, D, togglefloating
bind = $mainMod, P, pseudo
bind = $mainMod, O, layoutmsg, togglesplit
bind = $mainMod, G, togglegroup
bind = $mainMod, Tab, changegroupactive
bind = $mainMod SHIFT, F, fullscreen
bind = $mainMod, Z, pin

# Move focus with mainMod + arrow keys
# bind = $mainMod, H, movefocus, l
# bind = $mainMod, L, movefocus, r
# bind = $mainMod, K, movefocus, u
# bind = $mainMod, J, movefocus, d
bind = $mainMod, H, layoutmsg, focus l
bind = $mainMod, L, layoutmsg, focus r
bind = $mainMod, K, layoutmsg, focus u
bind = $mainMod, J, layoutmsg, focus d

# Move windows
# bind = $mainMod SHIFT, H, movewindow, l
# bind = $mainMod SHIFT, L, movewindow, r
bind = $mainMod SHIFT, H, layoutmsg, swapcol l
bind = $mainMod SHIFT, L, layoutmsg, swapcol r
bind = $mainMod SHIFT, K, movewindow, u
bind = $mainMod SHIFT, J, movewindow, d

# Resize windows
binde = $mainMod ALT, H, resizeactive, -20 0
binde = $mainMod ALT, L, resizeactive, 20 0
binde = $mainMod ALT, K, resizeactive, 0 -20
binde = $mainMod ALT, J, resizeactive, 0 20
binde = $mainMod ALT, comma, resizeactive, -1 0
binde = $mainMod ALT, period, resizeactive, 1 0
bind = $mainMod ALT, V, resizeactive, exact 2489 1400
bind = $mainMod ALT, D, resizeactive, exact 842 1400

# Switch workspaces with mainMod + [0-9]
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Special workspace
bind = $mainMod, Y, togglespecialworkspace
bind = $mainMod SHIFT, Y, movetoworkspace, special

# Scroll through existing workspaces with mainMod + scroll
bind = $mainMod, mouse_down, workspace, e-1
bind = $mainMod, mouse_up, workspace, e+1

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow
